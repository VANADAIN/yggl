name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm --filter yggl lint

  download:
    name: Download binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/download-binaries.mjs
      - name: Verify binary exists and is executable (unix)
        if: runner.os != 'Windows'
        run: |
          BIN=$(find packages -path "*/bin/yggstack" | head -1)
          test -f "$BIN" || (echo "Binary not found" && exit 1)
          test -x "$BIN" || (echo "Binary not executable" && exit 1)
          echo "OK: $BIN"
      - name: Verify binary exists (windows)
        if: runner.os == 'Windows'
        run: |
          $bin = Get-ChildItem -Recurse -Filter "yggstack.exe" packages | Select-Object -First 1
          if (-not $bin) { Write-Error "Binary not found"; exit 1 }
          Write-Host "OK: $($bin.FullName)"
        shell: pwsh

  integration:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/download-binaries.mjs
      - run: pnpm --filter yggl build
      - run: pnpm --filter yggl test:integration

  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
