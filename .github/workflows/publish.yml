name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Publish platform packages first, then main package
      - run: pnpm --filter yggl-darwin-arm64 publish --access public --no-git-checks
      - run: pnpm --filter yggl-darwin-x64 publish --access public --no-git-checks
      - run: pnpm --filter yggl-linux-x64 publish --access public --no-git-checks
      - run: pnpm --filter yggl-linux-arm64 publish --access public --no-git-checks
      - run: pnpm --filter yggl-win32-x64 publish --access public --no-git-checks
      - run: pnpm --filter yggl publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
