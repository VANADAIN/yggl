<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>yggl — frontend-backend example</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				max-width: 600px;
				margin: 4rem auto;
				padding: 0 1rem;
			}
			button {
				padding: 0.5rem 1rem;
				cursor: pointer;
			}
			pre {
				background: #f4f4f4;
				padding: 1rem;
				border-radius: 4px;
				overflow: auto;
			}
		</style>
	</head>
	<body>
		<h1>yggl frontend-backend example</h1>
		<p>
			This frontend is running locally. The backend is running on your teammate's machine,
			forwarded here via <code>yggl connect</code>.
		</p>
		<button type="button" id="hello">GET /api/hello</button>
		<button type="button" id="items">GET /api/items</button>
		<pre id="output">— click a button —</pre>
		<script type="module" src="./main.js"></script>
	</body>
</html>
